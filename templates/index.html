<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>WebRTC Camera Test</title>
    <style>
      body {
        font-family: sans-serif;
        background: #111;
        color: #eee;
        padding: 20px;
        max-width: 900px;
        margin: auto;
      }
      .video-container {
        position: relative;
        margin-top: 16px;
      }
      video {
        width: 100%;
        background: #000;
        border-radius: 8px;
        display: block;
      }
      #stats-overlay {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.7);
        padding: 10px 15px;
        border-radius: 6px;
        font-family: monospace;
        font-size: 14px;
        color: #0f0;
        pointer-events: none;
      }
      .stat-row {
        margin: 4px 0;
      }
      .stat-label {
        color: #aaa;
      }

      button {
        background: #3b65f5;
        color: white;
        border: 0;
        padding: 10px 20px;
        font-size: 15px;
        border-radius: 6px;
        cursor: pointer;
      }
      button:disabled {
        background: #555;
      }
      #log {
        background: #1a1a1d;
        padding: 12px;
        margin-top: 16px;
        font-family: monospace;
        font-size: 12px;
        height: 200px;
        overflow-y: auto;
        white-space: pre-wrap;
      }
      #config {
        background: #1a1a1d;
        padding: 16px;
        margin-top: 16px;
        border-radius: 8px;
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 10px 14px;
        align-items: center;
        max-width: 420px;
      }
      #config label {
        color: #aaa;
        font-size: 14px;
      }
      #config select,
      #config input {
        background: #111;
        color: #eee;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 6px 8px;
        font-size: 14px;
        width: 100%;
      }
      #config .full {
        grid-column: 1 / -1;
      }
    </style>
  </head>
  <body>
    <h1>WebRTC Camera Test</h1>
    <button id="start">Start Stream</button>

    <div class="video-container">
      <video id="video" autoplay playsinline muted></video>
      <div id="stats-overlay">
        <div class="stat-row">
          <span class="stat-label">FPS:</span> <span id="stat-fps">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Bitrate:</span>
          <span id="stat-bitrate">0 kbps</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Resolution:</span>
          <span id="stat-res">0x0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Latency:</span>
          <span id="stat-latency">0 ms</span>
        </div>
      </div>
    </div>

    <div id="config">
      <label for="cfg-res">Resolution</label>
      <select id="cfg-res">
        <option value="3840x2160">3840 x 2160 (4K)</option>
        <option value="1920x1080" selected>1920 x 1080 (1080p)</option>
        <option value="1280x720">1280 x 720 (720p)</option>
        <option value="854x480">854 x 480 (480p)</option>
        <option value="640x360">640 x 360 (360p)</option>
      </select>

      <label for="cfg-fps">Frame rate</label>
      <select id="cfg-fps">
        <option value="60">60 fps</option>
        <option value="30" selected>30 fps</option>
        <option value="25">25 fps</option>
        <option value="15">15 fps</option>
      </select>

      <label for="cfg-bitrate">Bitrate (kbps)</label>
      <input id="cfg-bitrate" type="number" min="100" max="100000" step="100" value="6000" />

      <label for="cfg-format">Raw format</label>
      <select id="cfg-format">
        <option value="I420" selected>I420</option>
        <option value="NV12">NV12</option>
        <option value="YUY2">YUY2</option>
        <option value="BGRA">BGRA</option>
      </select>

      <button id="apply" class="full">Apply Settings</button>
    </div>

    <div id="log"></div>

    <script>
      const video = document.getElementById("video");
      const startBtn = document.getElementById("start");
      const logEl = document.getElementById("log");

      const statFps = document.getElementById("stat-fps");
      const statBitrate = document.getElementById("stat-bitrate");
      const statRes = document.getElementById("stat-res");
      const statLatency = document.getElementById("stat-latency");

      const applyBtn = document.getElementById("apply");
      const cfgRes = document.getElementById("cfg-res");
      const cfgFps = document.getElementById("cfg-fps");
      const cfgBitrate = document.getElementById("cfg-bitrate");
      const cfgFormat = document.getElementById("cfg-format");

      let ws;
      let pc;
      let statsInterval;
      let streaming = false;

      function log(msg) {
        console.log(msg);
        logEl.textContent += msg + "\n";
        logEl.scrollTop = logEl.scrollHeight;
      }

      // Read the form into a VideoConfig matching the server's serde shape.
      function readConfig() {
        const [width, height] = cfgRes.value.split("x").map(Number);
        return {
          width,
          height,
          framerate: Number(cfgFps.value),
          bitrate_kbps: Number(cfgBitrate.value),
          format: cfgFormat.value,
        };
      }

      // Push a server config back into the form controls.
      function applyConfigToForm(cfg) {
        cfgRes.value = `${cfg.width}x${cfg.height}`;
        cfgFps.value = String(cfg.framerate);
        cfgBitrate.value = String(cfg.bitrate_kbps);
        cfgFormat.value = cfg.format;
      }

      function startStatsLoop() {
        clearInterval(statsInterval);
        let lastResult = null;

        statsInterval = setInterval(async () => {
          if (!pc) return;

          const stats = await pc.getStats();

          let currentFps = 0;
          let currentRes = "0x0";
          let bitrateStr = "0.00";
          let currentRtt = "0";
          let hasDataToLog = false;

          stats.forEach((report) => {
            if (
              report.type === "candidate-pair" &&
              report.state === "succeeded"
            ) {
              if (report.currentRoundTripTime !== undefined) {
                currentRtt = (report.currentRoundTripTime * 1000).toFixed(0);
                statLatency.innerText = currentRtt + " ms";
              }
            }

            if (report.type === "inbound-rtp" && report.kind === "video") {
              hasDataToLog = true;

              if (report.framesPerSecond !== undefined) {
                currentFps = report.framesPerSecond;
                statFps.innerText = currentFps;
              }

              if (report.frameWidth && report.frameHeight) {
                currentRes = `${report.frameWidth}x${report.frameHeight}`;
                statRes.innerText = currentRes;
              }

              if (lastResult && lastResult.has(report.id)) {
                const lastReport = lastResult.get(report.id);
                const bytesDiff =
                  report.bytesReceived - lastReport.bytesReceived;
                const timeDiff = report.timestamp - lastReport.timestamp;

                if (timeDiff > 0) {
                  const kbps = (bytesDiff * 8) / (timeDiff / 1000) / 1000;
                  bitrateStr = kbps.toFixed(2);
                  statBitrate.innerText = bitrateStr + " kbps";
                }
              }
            }
          });

          if (hasDataToLog) {
            log(
              `[Metrics] FPS: ${currentFps} | Bitrate: ${bitrateStr} kbps | Res: ${currentRes} | Latency: ${currentRtt} ms`,
            );
          }

          lastResult = stats;
        }, 1000);
      }

      function send(obj) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(obj));
        }
      }

      // Tear down the current RTCPeerConnection (used before reconnecting on a
      // server reconfigure).
      function teardownPeer() {
        clearInterval(statsInterval);
        if (pc) {
          pc.close();
          pc = null;
        }
        video.srcObject = null;
      }

      // Build a fresh peer connection and ask the server to start a stream.
      function startPeer() {
        teardownPeer();
        pc = new RTCPeerConnection({
          iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
        });

        pc.ontrack = (event) => {
          log("Track received");
          video.srcObject = event.streams[0];
          startStatsLoop();
        };

        pc.oniceconnectionstatechange = () =>
          log("ICE: " + pc.iceConnectionState);

        pc.onicecandidate = (event) => {
          if (event.candidate) {
            send({
              type: "ice_candidate",
              candidate: event.candidate.candidate,
              sdp_mline_index: event.candidate.sdpMLineIndex,
            });
          }
        };

        log("Sending start");
        send({ type: "start" });
      }

      function connect() {
        ws = new WebSocket(`ws://${location.host}/ws`);

        ws.onopen = () => {
          log("WS open");
          send({ type: "get_config" }); // sync the form to the live config
          if (streaming) startPeer();
        };

        ws.onmessage = async (event) => {
          let msg;
          try {
            msg = JSON.parse(event.data);
          } catch (e) {
            log("Ignoring non-JSON: " + event.data);
            return;
          }
          log("<- " + msg.type);

          if (msg.type === "offer") {
            if (!pc) return;
            await pc.setRemoteDescription({ type: "offer", sdp: msg.sdp });
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            send({ type: "answer", sdp: answer.sdp });
          } else if (msg.type === "ice_candidate") {
            if (!pc) return;
            try {
              await pc.addIceCandidate({
                candidate: msg.candidate,
                sdpMLineIndex: msg.sdp_mline_index,
              });
            } catch (e) {
              log("addIceCandidate failed: " + e);
            }
          } else if (msg.type === "config") {
            applyConfigToForm(msg.config);
            log("Config: " + JSON.stringify(msg.config));
          } else if (msg.type === "reconfigured") {
            // Server rebuilt the pipeline; our old branch is gone. Reconnect
            // the peer if we were streaming.
            log("Server reconfigured; reconnecting peer");
            if (streaming) startPeer();
          } else if (msg.type === "error") {
            log("Server error: " + msg.message);
            alert(msg.message);
          }
        };

        ws.onclose = () => {
          log("WS closed");
          teardownPeer();
          startBtn.disabled = false;
        };
      }

      startBtn.addEventListener("click", () => {
        startBtn.disabled = true;
        streaming = true;
        startPeer();
      });

      applyBtn.addEventListener("click", () => {
        const config = readConfig();
        log("Applying config: " + JSON.stringify(config));
        send({ type: "set_config", config });
      });

      // Open the signaling socket on load so the form syncs to the live config.
      connect();
    </script>
  </body>
</html>
