<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>WebRTC Camera Test</title>
    <style>
      body {
        font-family: sans-serif;
        background: #111;
        color: #eee;
        padding: 20px;
        max-width: 900px;
        margin: auto;
      }
      .video-container {
        position: relative;
        margin-top: 16px;
      }
      video {
        width: 100%;
        background: #000;
        border-radius: 8px;
        display: block;
      }
      #stats-overlay {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.7);
        padding: 10px 15px;
        border-radius: 6px;
        font-family: monospace;
        font-size: 14px;
        color: #0f0;
        pointer-events: none;
      }
      .stat-row {
        margin: 4px 0;
      }
      .stat-label {
        color: #aaa;
      }

      button {
        background: #3b65f5;
        color: white;
        border: 0;
        padding: 10px 20px;
        font-size: 15px;
        border-radius: 6px;
        cursor: pointer;
      }
      button:disabled {
        background: #555;
      }
      #log {
        background: #1a1a1d;
        padding: 12px;
        margin-top: 16px;
        font-family: monospace;
        font-size: 12px;
        height: 200px;
        overflow-y: auto;
        white-space: pre-wrap;
      }
      #config {
        background: #1a1a1d;
        padding: 16px;
        margin-top: 16px;
        border-radius: 8px;
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 10px 14px;
        align-items: center;
        max-width: 420px;
      }
      #config label {
        color: #aaa;
        font-size: 14px;
      }
      #config select,
      #config input {
        background: #111;
        color: #eee;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 6px 8px;
        font-size: 14px;
        width: 100%;
      }
      #config .full {
        grid-column: 1 / -1;
      }
    </style>
  </head>
  <body>
    <h1>WebRTC Camera Test</h1>
    <button id="start">Start Stream</button>

    <div class="video-container">
      <video id="video" autoplay playsinline muted></video>
      <div id="stats-overlay">
        <div class="stat-row">
          <span class="stat-label">FPS:</span> <span id="stat-fps">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Bitrate:</span>
          <span id="stat-bitrate">0 kbps</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Resolution:</span>
          <span id="stat-res">0x0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Latency:</span>
          <span id="stat-latency">0 ms</span>
        </div>
      </div>
    </div>

    <div id="config">
      <!-- Camera / resolution / frame-rate options are populated at runtime from
           the connected devices' REAL capabilities (get_devices). Start empty. -->
      <label for="cfg-device">Camera</label>
      <select id="cfg-device"></select>

      <label for="cfg-res">Resolution</label>
      <select id="cfg-res"></select>

      <label for="cfg-fps">Frame rate</label>
      <select id="cfg-fps"></select>

      <label for="cfg-bitrate">Bitrate (kbps)</label>
      <input id="cfg-bitrate" type="number" min="100" max="100000" step="100" value="6000" />

      <label for="cfg-format">Encoder format</label>
      <select id="cfg-format">
        <option value="I420">I420</option>
        <option value="NV12">NV12</option>
        <option value="YUY2">YUY2</option>
        <option value="BGRA">BGRA</option>
      </select>

      <button id="apply" class="full">Apply Settings</button>
    </div>

    <div id="log"></div>

    <script>
      const video = document.getElementById("video");
      const startBtn = document.getElementById("start");
      const logEl = document.getElementById("log");

      const statFps = document.getElementById("stat-fps");
      const statBitrate = document.getElementById("stat-bitrate");
      const statRes = document.getElementById("stat-res");
      const statLatency = document.getElementById("stat-latency");

      const applyBtn = document.getElementById("apply");
      const cfgDevice = document.getElementById("cfg-device");
      const cfgRes = document.getElementById("cfg-res");
      const cfgFps = document.getElementById("cfg-fps");
      const cfgBitrate = document.getElementById("cfg-bitrate");
      const cfgFormat = document.getElementById("cfg-format");

      let ws;
      let pc;
      let statsInterval;
      let streaming = false;
      let devices = []; // connected cameras + their caps, from the server

      function log(msg) {
        console.log(msg);
        logEl.textContent += msg + "\n";
        logEl.scrollTop = logEl.scrollHeight;
      }

      // Caps of the currently-selected camera (empty if none / not found).
      function currentCaps() {
        const dev = devices.find((d) => d.id === cfgDevice.value);
        return dev ? dev.caps : [];
      }

      // Distinct resolutions for the selected camera, sorted high-res first.
      function distinctResolutions() {
        const seen = new Map(); // "WxH" -> {width, height}
        for (const c of currentCaps()) {
          seen.set(`${c.width}x${c.height}`, { width: c.width, height: c.height });
        }
        return [...seen.values()].sort(
          (a, b) => b.width * b.height - a.width * a.height,
        );
      }

      // Frame rates the selected camera supports AT a resolution, descending.
      function frameRatesFor(width, height) {
        const set = new Set();
        for (const c of currentCaps()) {
          if (c.width === width && c.height === height) set.add(c.framerate);
        }
        return [...set].sort((a, b) => b - a);
      }

      // Rebuild the camera dropdown from the device list, keeping the current
      // selection if still present.
      function populateDevices(selectedId) {
        cfgDevice.innerHTML = "";
        for (const d of devices) {
          const opt = document.createElement("option");
          opt.value = d.id;
          opt.textContent = `${d.name} (${d.caps.length} modes)`;
          cfgDevice.appendChild(opt);
        }
        if (selectedId && devices.some((d) => d.id === selectedId)) {
          cfgDevice.value = selectedId;
        }
        populateResolutions();
      }

      // Rebuild the resolution dropdown for the selected camera. No-op when the
      // camera advertises no modes.
      function populateResolutions(selected) {
        const resolutions = distinctResolutions();
        cfgRes.innerHTML = "";
        for (const r of resolutions) {
          const opt = document.createElement("option");
          opt.value = `${r.width}x${r.height}`;
          opt.textContent = `${r.width} x ${r.height}`;
          cfgRes.appendChild(opt);
        }
        if (selected) cfgRes.value = selected;
        populateFrameRates();
      }

      // Rebuild the frame-rate dropdown to match the selected resolution.
      function populateFrameRates(selected) {
        const [width, height] = cfgRes.value.split("x").map(Number);
        const rates = frameRatesFor(width, height);
        cfgFps.innerHTML = "";
        for (const fps of rates) {
          const opt = document.createElement("option");
          opt.value = String(fps);
          opt.textContent = `${fps} fps`;
          cfgFps.appendChild(opt);
        }
        if (selected && rates.includes(Number(selected))) {
          cfgFps.value = String(selected);
        }
      }

      // Read the form into a VideoConfig matching the server's serde shape.
      function readConfig() {
        const [width, height] = cfgRes.value.split("x").map(Number);
        return {
          width,
          height,
          framerate: Number(cfgFps.value),
          bitrate_kbps: Number(cfgBitrate.value),
          format: cfgFormat.value,
          device_id: cfgDevice.value || null,
        };
      }

      // Push a server config back into the form controls. Ensures each option
      // exists (device list may not have arrived yet) before selecting it.
      function applyConfigToForm(cfg) {
        // Camera: select it if known; refresh res/fps from its caps.
        if (cfg.device_id && devices.some((d) => d.id === cfg.device_id)) {
          cfgDevice.value = cfg.device_id;
          populateResolutions();
        }
        const resVal = `${cfg.width}x${cfg.height}`;
        if (![...cfgRes.options].some((o) => o.value === resVal)) {
          const opt = document.createElement("option");
          opt.value = resVal;
          opt.textContent = `${cfg.width} x ${cfg.height}`;
          cfgRes.appendChild(opt);
        }
        cfgRes.value = resVal;
        populateFrameRates(cfg.framerate);
        cfgBitrate.value = String(cfg.bitrate_kbps);
        cfgFormat.value = cfg.format;
      }

      function startStatsLoop() {
        clearInterval(statsInterval);
        let lastResult = null;

        statsInterval = setInterval(async () => {
          if (!pc) return;

          const stats = await pc.getStats();

          let currentFps = 0;
          let currentRes = "0x0";
          let bitrateStr = "0.00";
          let currentRtt = "0";
          let hasDataToLog = false;

          stats.forEach((report) => {
            if (
              report.type === "candidate-pair" &&
              report.state === "succeeded"
            ) {
              if (report.currentRoundTripTime !== undefined) {
                currentRtt = (report.currentRoundTripTime * 1000).toFixed(0);
                statLatency.innerText = currentRtt + " ms";
              }
            }

            if (report.type === "inbound-rtp" && report.kind === "video") {
              hasDataToLog = true;

              if (report.framesPerSecond !== undefined) {
                currentFps = report.framesPerSecond;
                statFps.innerText = currentFps;
              }

              if (report.frameWidth && report.frameHeight) {
                currentRes = `${report.frameWidth}x${report.frameHeight}`;
                statRes.innerText = currentRes;
              }

              if (lastResult && lastResult.has(report.id)) {
                const lastReport = lastResult.get(report.id);
                const bytesDiff =
                  report.bytesReceived - lastReport.bytesReceived;
                const timeDiff = report.timestamp - lastReport.timestamp;

                if (timeDiff > 0) {
                  const kbps = (bytesDiff * 8) / (timeDiff / 1000) / 1000;
                  bitrateStr = kbps.toFixed(2);
                  statBitrate.innerText = bitrateStr + " kbps";
                }
              }
            }
          });

          if (hasDataToLog) {
            log(
              `[Metrics] FPS: ${currentFps} | Bitrate: ${bitrateStr} kbps | Res: ${currentRes} | Latency: ${currentRtt} ms`,
            );
          }

          lastResult = stats;
        }, 1000);
      }

      function send(obj) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(obj));
        }
      }

      // Tear down the current RTCPeerConnection (used before reconnecting on a
      // server reconfigure).
      function teardownPeer() {
        clearInterval(statsInterval);
        if (pc) {
          pc.close();
          pc = null;
        }
        video.srcObject = null;
      }

      // Build a fresh peer connection and ask the server to start a stream.
      function startPeer() {
        teardownPeer();
        pc = new RTCPeerConnection({
          iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
        });

        pc.ontrack = (event) => {
          log("Track received");
          video.srcObject = event.streams[0];
          startStatsLoop();
        };

        pc.oniceconnectionstatechange = () =>
          log("ICE: " + pc.iceConnectionState);

        pc.onicecandidate = (event) => {
          if (event.candidate) {
            send({
              type: "ice_candidate",
              candidate: event.candidate.candidate,
              sdp_mline_index: event.candidate.sdpMLineIndex,
            });
          }
        };

        log("Sending start");
        send({ type: "start" });
      }

      function connect() {
        ws = new WebSocket(`ws://${location.host}/ws`);

        ws.onopen = () => {
          log("WS open");
          send({ type: "get_devices" }); // cameras + modes for the form
          send({ type: "get_config" }); // then sync to the live config
          if (streaming) startPeer();
        };

        ws.onmessage = async (event) => {
          let msg;
          try {
            msg = JSON.parse(event.data);
          } catch (e) {
            log("Ignoring non-JSON: " + event.data);
            return;
          }
          log("<- " + msg.type);

          if (msg.type === "offer") {
            if (!pc) return;
            await pc.setRemoteDescription({ type: "offer", sdp: msg.sdp });
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            send({ type: "answer", sdp: answer.sdp });
          } else if (msg.type === "ice_candidate") {
            if (!pc) return;
            try {
              await pc.addIceCandidate({
                candidate: msg.candidate,
                sdpMLineIndex: msg.sdp_mline_index,
              });
            } catch (e) {
              log("addIceCandidate failed: " + e);
            }
          } else if (msg.type === "devices") {
            devices = msg.devices || [];
            log(`Cameras: ${devices.length}`);
            populateDevices(cfgDevice.value || null);
          } else if (msg.type === "config") {
            applyConfigToForm(msg.config);
            log("Config: " + JSON.stringify(msg.config));
          } else if (msg.type === "reconfigured") {
            // Server rebuilt the pipeline; our old branch (if any) is gone.
            // Only reconnect if we were actually streaming.
            if (streaming) {
              log("Server reconfigured; reconnecting peer");
              startPeer();
            } else {
              log("Server reconfigured (not streaming)");
            }
          } else if (msg.type === "error") {
            log("Server error: " + msg.message);
            alert(msg.message);
          }
        };

        ws.onclose = () => {
          log("WS closed");
          teardownPeer();
          startBtn.disabled = false;
        };
      }

      startBtn.addEventListener("click", () => {
        startBtn.disabled = true;
        streaming = true;
        startPeer();
      });

      // When the camera changes, rebuild resolution (and thus fps) from that
      // device's caps.
      cfgDevice.addEventListener("change", () => populateResolutions());

      // When the resolution changes, refresh the frame-rate list to only the
      // rates the camera supports at that resolution.
      cfgRes.addEventListener("change", () => populateFrameRates());

      applyBtn.addEventListener("click", () => {
        const config = readConfig();
        log("Applying config: " + JSON.stringify(config));
        send({ type: "set_config", config });
      });

      // Open the signaling socket on load so the form syncs to the live config.
      connect();
    </script>
  </body>
</html>
